# This workflow builds the extension and runs the test suite.
name: Extension tests
on:
  push:
  pull_request:
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref || '' }}-${{ github.base_ref || '' }}-${{ github.ref != 'refs/heads/main' && github.sha || '' }}
  cancel-in-progress: true
jobs:
  tests:
    name: Run all tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@main
        with:
          key: ${{ github.job }}
          save: ${{ github.ref == 'refs/heads/main' }}
      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11.1
        with:
          # Match the commit used by extension-ci-tools workflows.
          vcpkgGitCommitId: 84bab45d415d22042bd0b9081aea57f362da3f35
      - name: Build extension binaries
        env:
          GEN: ninja
          VCPKG_TOOLCHAIN_PATH: ${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake
          VCPKG_TARGET_TRIPLET: x64-linux
          USE_MERGED_VCPKG_MANIFEST: 1
          EXT_DEBUG_FLAGS: -DDUCKDB_LINKER=bfd
        run: make release
      - name: Run tests
        run: make test
